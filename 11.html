<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认识一下我吧 👋</title>
    <style>
        /* 基础重置与全局设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f7f7; 
            color: #4a3b3b;
            line-height: 1.7; 
        }

        /* 移动端主容器 */
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: linear-gradient(135deg, #fffaf7 0%, #ffe8e0 100%);
            min-height: 100vh;
            padding: 40px 20px 120px 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* 首屏视觉区 */
        .hero {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 8px 16px rgba(255, 160, 122, 0.2);
            margin-bottom: 15px;
        }
        .hero h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #332828;
        }
        .hero p {
            font-size: 15px;
            color: #7a6565;
        }

        /* 标签区 */
        .tags {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }
        .tag {
            background-color: rgba(255, 255, 255, 0.7);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #d86c58;
            border: 1px solid #fbdcd5;
        }

        /* 自我介绍区 - 已缩小调整 */
        .about-section {
            background-color: rgba(255, 255, 255, 0.7);
            padding: 20px; /* 减小了内边距，原来是 28px 25px */
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(216, 108, 88, 0.05);
            border-left: 4px solid #d86c58; 
        }
        .about-section h2 {
            font-size: 17px; /* 稍微调小了标题 */
            margin-bottom: 12px; /* 减小了标题和正文的间距 */
            color: #d86c58;
        }
        .about-section p {
            font-size: 14px; /* 稍微调小了正文字号，原来是 15px */
            margin-bottom: 12px;
            text-align: justify;
        }
        .about-section p:last-child {
            margin-bottom: 0;
            font-weight: 500;
            color: #d86c58; 
        }

        /* 照片墙 - 4张图，3:4比例 */
        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .gallery-img {
            width: 100%;
            height: auto;
            aspect-ratio: 3 / 4; /* 强制锁定比例为 3:4 */
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 底部悬浮 WhatsApp 按钮区 */
        .sticky-footer {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            padding: 15px 20px 25px 20px;
            border-top: 1px solid #f2f2f2;
            text-align: center;
            z-index: 100;
        }
        .cta-text {
            font-size: 13px;
            color: #7a6565;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #25D366; 
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            animation: pulse 2s infinite; 
        }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }
            50% { transform: scale(1.03); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.6); }
            100% { transform: scale(1); box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="hero">
            <img src="images/avatar.jpg" alt="我的头像" class="profile-pic">
            <h1>你好！我是 [你的名字] 👋</h1>
            <p>在喧嚣的世界里，期待与你开启一段真诚的对话。</p>
        </header>

        <section class="tags">
            <span class="tag">✨ 目前单身</span>
            <span class="tag">✈️ 热爱生活</span>
            <span class="tag">🎵 寻找同频的你</span>
        </section>

        <section class="about-section">
            <h2>关于我</h2>
            <p>目前单身。虽然每天的生活都很充实，但每当遇到有趣的风景、吃到好吃的餐厅时，总觉得如果能有一个人分享，快乐一定会翻倍。</p>
            <p>我性格真诚、独立，对世界保持着好奇心。也许我们之前在各自的轨迹上忙碌，但我很期待能在这里遇到那个“刚刚好”的你。不需要刻意伪装，只希望能拥有一段轻松、同频的交往关系。</p>
            <p>如果你也单身，并且想认识一个有趣的新朋友，现在就和我打个招呼吧！</p>
        </section>

        <section class="gallery">
            <img src="images/photo1.jpg" alt="生活照1" class="gallery-img">
            <img src="images/photo2.jpg" alt="生活照2" class="gallery-img">
            <img src="images/photo3.jpg" alt="生活照3" class="gallery-img">
            <img src="images/photo4.jpg" alt="生活照4" class="gallery-img">
        </section>
    </div>

    <div class="sticky-footer">
        <p class="cta-text">心动不如行动，点击下方按钮直接和我聊天 👇</p>
        <a href="whatsapp://send?phone=YOUR_NUMBER" class="whatsapp-btn">
            💬 添加我的 whatsapp，认识一下
        </a>
    </div>

</body>
</html>
